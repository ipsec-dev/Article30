name: Release Publish (GHCR)

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  # OIDC token for keyless cosign signing.
  id-token: write
  # Attach SBOM / provenance attestations to the published image.
  attestations: write

concurrency:
  group: release-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Each leg builds one image at the same semver as the runtime images.
        # `backend-tools` reuses backend/Dockerfile's `tools` target so admin
        # scripts (seed, password:reset, etc.) stay in lockstep with the
        # backend's prisma schema and code.
        include:
          - name: backend
            file: backend/Dockerfile
            target: prod
          - name: frontend
            file: frontend/Dockerfile
            target: prod
          - name: backend-tools
            file: backend/Dockerfile
            target: tools
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/ipsec-dev/article30/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless OIDC sign each published tag at the just-pushed digest. Pinning
      # to the digest (not the tag) ensures the signature stays attached to the
      # immutable image even if the tag is reused later.
      - name: Sign published tags
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "$TAGS"
