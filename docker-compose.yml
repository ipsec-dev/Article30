name: article30

# Production-correct base. Plain `docker compose up` runs prod.
# For dev, overlay dev/compose.yml: docker compose -f docker-compose.yml -f dev/compose.yml --env-file .env.dev up

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '5'

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_DB: article30
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d article30']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}']
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.93
    restart: unless-stopped
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY}
    volumes:
      - rustfsdata:/data
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/health']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: prod
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/article30
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      NODE_ENV: ${NODE_ENV}
      COOKIE_SECURE: ${COOKIE_SECURE}
      S3_ENDPOINT: http://rustfs:9000
      S3_BUCKET: article30-documents
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-}
      LOG_PRETTY: ${LOG_PRETTY:-}
      LOG_HTTP: ${LOG_HTTP:-true}
    ports:
      - '127.0.0.1:3001:3001'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3001/health > /dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:3001
    ports:
      - '127.0.0.1:3000:3000'

volumes:
  pgdata:
  rustfsdata:
